# .github/workflows/deploy-frontend.yml
# ══════════════════════════════════════════════════════════════════════════════
# GisViz Frontend — Production Deploy
#
# Trigger: push to `main` branch
#
# Fixes from previous version:
#   1. Trigger changed from 'deploy' branch to 'main'
#   2. VPS fetches 'main' — no 'deploy' branch confusion
#   3. git checkout -B main handles any local branch state on VPS
#   4. permissions block added — fixes 403 on createCommitComment
#   5. .env.frontend guard gives explicit creation instructions
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy Frontend

on:
  push:
    branches: [main]

# Required for createCommitComment to work
permissions:
  contents: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e

            # ── 1. Ensure directories exist (self-healing) ───────────────────
            # No sudo — /srv/gisviz must be pre-created and owned by deploy.
            # Run this ONCE manually on the VPS:
            #   sudo mkdir -p /srv/gisviz
            #   sudo chown -R deploy:deploy /srv/gisviz
            # After that no sudo is ever needed in this script.
            echo "=== [1/6] Ensuring directories exist ==="

            mkdir -p /srv/gisviz

            if [ ! -d /srv/gisviz/gisviz-frontend/.git ]; then
              echo "  Repo not found — cloning..."
              git clone git@github.com:Minutebound/gisviz-frontend.git                 /srv/gisviz/gisviz-frontend
            fi

            # NOW safe to cd
            cd /srv/gisviz/gisviz-frontend

            # ── 2. Clean fetch of main branch ────────────────────────────────
            echo "=== [2/6] Fetching latest main branch ==="
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd
            echo "  Now at: $(git log --oneline -1)"

            # ── 3. Verify .env.frontend exists ───────────────────────────────
            echo "=== [3/6] Checking required files ==="
            if [ ! -f .env.frontend ]; then
              echo ""
              echo "══════════════════════════════════════════════════════"
              echo "  ERROR: .env.frontend not found"
              echo "  Create it on the VPS:"
              echo "    nano /srv/gisviz/gisviz-frontend/.env.frontend"
              echo "  Contents:"
              echo "    NEXT_PUBLIC_API_URL=https://api.gisviz.com"
              echo "    NEXT_PUBLIC_GA_ID=G-2MY97W2CKX"
              echo "══════════════════════════════════════════════════════"
              exit 1
            fi
            echo "  .env.frontend found ✓"

            # ── 3. Stop frontend container ───────────────────────────────────
            echo "=== [4/6] Stopping frontend container ==="
            docker compose down
            echo "  Stopped ✓"

            # ── 4. Build and start ───────────────────────────────────────────
            echo "=== [5/6] Building frontend image ==="
            docker compose build --no-cache
            echo "  Build complete ✓"

            echo "=== [6/6] Starting frontend container ==="
            docker compose up -d

            sleep 8
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET http://localhost:3000/)
            if [ "$STATUS" != "200" ]; then
              echo "HEALTH CHECK FAILED — HTTP $STATUS"
              docker compose logs --tail 50
              exit 1
            fi
            echo "Health check passed — HTTP $STATUS ✓"

            docker image prune -f

      - name: Create release branch
        if: success()
        run: |
          BRANCH="release/frontend-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "Release branch created: $BRANCH"

      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.createCommitComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              commit_sha: context.sha,
              body:       `✅ **Frontend deployed** — \`${context.sha.slice(0,7)}\` is live on \`gisviz.com\``,
            })

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.createCommitComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              commit_sha: context.sha,
              body:       `❌ **Frontend deploy FAILED** — [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            })