services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: gisviz-frontend
    restart: always
    env_file:
      - .env.frontend
    ports:
      - "3001:3000"      # Prevent Next.js build cache crashes
    networks:
      - gisviz-network

networks:
  gisviz-network:
    external: true