services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID}
    env_file:
      - .env.frontend
    container_name: gisviz-frontend
    restart: always
    ports:
      - "3001:3000"
    networks:
      - gisviz-network

networks:
  gisviz-network:
    external: true